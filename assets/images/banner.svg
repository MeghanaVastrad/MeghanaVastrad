<svg fill="none" viewBox="0 0 1200 340" width="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#090d16"/>
    </linearGradient>

    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#bc8cff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>

    <linearGradient id="glow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bc8cff" stop-opacity="0.0"/>
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="0.5" stroke-opacity="0.3"/>
    </pattern>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg-gradient)" rx="16"/>
  <rect width="1200" height="340" fill="url(#grid)" rx="16"/>

  <!-- Ambient Glow Circles -->
  <circle cx="150" cy="80" r="180" fill="url(#glow-gradient)" filter="url(#glow)"/>
  <circle cx="1050" cy="260" r="150" fill="url(#glow-gradient)" filter="url(#glow)"/>

  <!-- Top Accent Bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-gradient)"/>

  <!-- Terminal Window Graphic Frame -->
  <rect x="60" y="50" width="1080" height="240" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <rect x="60" y="50" width="1080" height="40" rx="12" fill="#21262d"/>
  
  <!-- Window Controls -->
  <circle cx="90" cy="70" r="6" fill="#ff5f56"/>
  <circle cx="110" cy="70" r="6" fill="#ffbd2e"/>
  <circle cx="130" cy="70" r="6" fill="#27c93f"/>
  <text x="160" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#8b949e">meghana-vastrad ~ profile-terminal</text>

  <!-- Main Heading Content -->
  <g transform="translate(100, 130)">
    <!-- Subtitle / Status -->
    <text x="0" y="10" font-family="'Fira Code', 'Courier New', monospace" font-size="16" fill="#58a6ff">❯ whoami --verbose</text>
    
    <!-- Title -->
    <text x="0" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#f0f6fc" letter-spacing="1">MEGHANA VASTRAD</text>
    
    <!-- Role tagline -->
    <text x="0" y="90" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="url(#accent-gradient)">Full-Stack Software Engineer &amp; Open Source Explorer</text>
    
    <!-- Tech Pills -->
    <g transform="translate(0, 115)">
      <rect x="0" y="0" width="110" height="26" rx="13" fill="#21262d" stroke="#30363d"/>
      <text x="55" y="17" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#8b949e">⚛️ React / Next</text>

      <rect x="120" y="0" width="110" height="26" rx="13" fill="#21262d" stroke="#30363d"/>
      <text x="175" y="17" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#8b949e">🐍 Python / AI</text>

      <rect x="240" y="0" width="120" height="26" rx="13" fill="#21262d" stroke="#30363d"/>
      <text x="300" y="17" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#8b949e">🚀 Node / Cloud</text>

      <rect x="370" y="0" width="110" height="26" rx="13" fill="#21262d" stroke="#30363d"/>
      <text x="425" y="17" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="#8b949e">🌐 Open Source</text>
    </g>
  </g>

  <!-- Right Decorative Elements -->
  <g transform="translate(850, 120)">
    <rect x="0" y="0" width="230" height="130" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="20" y="35" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#bc8cff">⚡ CURRENT FOCUS</text>
    <text x="20" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#c9d1d9">• Building scalable apps</text>
    <text x="20" y="88" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#c9d1d9">• Exploring AI &amp; LLMs</text>
    <text x="20" y="111" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#c9d1d9">• Open-source tooling</text>
  </g>
</svg>
